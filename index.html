        function ProductCarousel({ imagenes, productNombre, activeIndex, onIndexChange }) {
            const [localIndex, setLocalIndex] = useState(0);
            const [touchStart, setTouchStart] = useState(0);
            const [touchEnd, setTouchEnd] = useState(0);

            useEffect(() => {
                if (activeIndex !== undefined) {
                    setLocalIndex(activeIndex);
                }
            }, [activeIndex]);

            if (!imagenes || imagenes.length === 0) return null;

            const updateIndex = (newIdx) => {
                setLocalIndex(newIdx);
                if (onIndexChange) onIndexChange(newIdx);
            };

            const nextSlide = (e) => {
                e.stopPropagation();
                updateIndex((localIndex + 1) % imagenes.length);
            };

            const prevSlide = (e) => {
                e.stopPropagation();
                updateIndex((localIndex - 1 + imagenes.length) % imagenes.length);
            };

            const handleTouchStart = (e) => {
                setTouchStart(e.targetTouches[0].clientX);
            };

            const handleTouchMove = (e) => {
                setTouchEnd(e.targetTouches[0].clientX);
            };

            const handleTouchEnd = () => {
                if (touchStart - touchEnd > 50) {
                    nextSlide({ stopPropagation: () => {} });
                }
                if (touchStart - touchEnd < -50) {
                    prevSlide({ stopPropagation: () => {} });
                }
            };

            const currentImg = imagenes[localIndex];
            const isSmallOrPackaging = currentImg.includes('300x300') || currentImg.includes('thumb');

            return (
                <div 
                    className="relative w-full aspect-[4/3] sm:aspect-[3/2] overflow-hidden group select-none img-studio-bg border-b border-stone-200/80"
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onTouchEnd={handleTouchEnd}
                >
                    <div className="w-full h-full relative flex items-center justify-center p-4">
                        <img 
                            src={currentImg} 
                            alt={`${productNombre} - sabor ${localIndex + 1}`} 
                            className={`transition-all duration-700 ease-out img-premium zoom-img ${
                                isSmallOrPackaging 
                                ? 'max-h-[85%] max-w-[85%] object-contain' 
                                : 'w-full h-full object-cover'
                            }`}
                            onError={(e) => {
                                e.target.src = "https://placehold.co/600x400/FDFBF7/1C352D?text=NutriCrisp";
                            }}

                    </div>

                    {imagenes.length > 1 && (
                        <>
                            <button 
                                onClick={prevSlide}
                                className="absolute left-4 top-1/2 -translate-y-1/2 bg-white/95 hover:bg-white text-oliveDeep w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-90 z-10 opacity-100 sm:opacity-0 sm:group-hover:opacity-100"

                                <i className="fa-solid fa-chevron-left text-sm"></i>
                            </button>
                            <button

                                className="absolute right-4 top-1/2 -translate-y-1/2 bg-white/95 hover:bg-white text-oliveDeep w-10 h-10 rounded-full flex items-center justify-center shadow-lg transition-all active:scale-90 z-10 opacity-100 sm:opacity-0 sm:group-hover:opacity-100"

                            </button>

                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 z-10">
                                {imagenes.map((_, idx) => (
                                    <button
                                        key={idx}
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            updateIndex(idx);
                                        }}
                                        className={`h-2 rounded-full transition-all duration-300 ${
                                            idx === localIndex ? 'bg-terracotta w-6' : 'bg-stone-400/80 hover:bg-white'
                                        }`}
                                    />
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        }

                        item.id === producto.id && item.sabor === saborSeleccionado
                    );

                        return prevCart.map(item => 
                            (item.id === producto.id && item.sabor === saborSeleccionado)

                                : item
                        );

                            if (idx !== -1 && producto.imagenes[idx]) {
                                imagenAsociada = producto.imagenes[idx];
                            }
                        }

                            nombre: producto.nombre,
                            presentacion: producto.presentacion,
                            precio: producto.precio,
                            sabor: saborSeleccionado,

                        }];

            };

                setCart(prevCart => {
                    const item = prevCart.find(i => i.id === id && i.sabor === sabor);

                        return prevCart.filter(i => !(i.id === id && i.sabor === sabor));
                    }
                    return prevCart.map(i =>

            const filteredProducts = selectedCategory === 'Todos'

                                                    <span>Envío:</span>
                                                    <span className="font-black text-slate-950">
                                                        {costoEnvio === 0 ? <span className="text-emerald-800">¡Bonificado!</span> : `$${costoEnvio.toLocaleString('es-AR')}`}
                                                    </span>
                                                </div>
                                                {costoEnvio > 0 && (
                                                    <p className="text-xs text-slate-600 italic text-right font-semibold">Sumá ${(25000 - subtotal).toLocaleString('es-AR')} más para envío gratis.</p>
                                                )}
                                                <div className="flex justify-between text-lg font-black text-oliveDeep pt-2 border-t border-stone-200">
                                                    <span>Total estimado:</span>
                                                    <span>${totalCompra.toLocaleString('es-AR')}</span>
                                                </div>
                                            </div>

                                            <button 
                                                onClick={handleStartPurchase}
                                                className="w-full bg-terracotta hover:bg-terracottaHover text-white py-4 rounded-xl font-black tracking-wide transition-all uppercase text-base shadow-md flex items-center justify-center gap-2 hover:scale-102"
                                            >
                                                Iniciar Compra <i className="fa-solid fa-angle-right text-lg"></i>
                                            </button>
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                    )}


                    {/* --- MODAL DE CHECKOUT COMPLETO Y FACTURACIÓN ELECTRÓNICA SIMULADA --- */}
                    {}
                    {checkoutStep !== 'idle' && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 overflow-y-auto">
                            <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm animate-fade-in"></div>

                            <div className="relative bg-white w-full max-w-xl rounded-3xl overflow-hidden shadow-2xl z-10 border border-stone-200">
                                
                                {checkoutStep !== 'success' && (
                                    <div className="p-6 border-b border-stone-200 flex justify-between items-center bg-stone-50">
                                        <h3 className="text-xl font-black text-oliveDeep">Finalizar Compra</h3>
                                        {checkoutStep === 'form' && (
                                            <button 
                                                onClick={() => setCheckoutStep('idle')}
                                                className="text-slate-900 hover:text-black p-1"
                                                aria-label="Cerrar formulario"
                                            >
                                                <i className="fa-solid fa-xmark text-2xl"></i>
                                            </button>
                                        )}
                                    </div>
                                )}

                                {/* PASO 1: FORMULARIO INTERNO DE CHECKOUT */}
                                {checkoutStep === 'form' && (
                                    <form onSubmit={handleFormSubmit} className="p-6 space-y-4 max-h-[75vh] overflow-y-auto text-left">
                                        <h4 className="text-xs font-black text-oliveDeep uppercase tracking-wider mb-2">Datos de Entrega</h4>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">Nombre Completo</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={customerData.nombre}
                                                    onChange={(e) => setCustomerData({...customerData, nombre: e.target.value})}
                                                    placeholder="Juan Pérez" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-oliveDeep"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">Email (Gmail de preferencia)</label>
                                                <input 
                                                    type="email" 
                                                    required
                                                    value={customerData.email}
                                                    onChange={(e) => setCustomerData({...customerData, email: e.target.value})}
                                                    placeholder="juan.perez@gmail.com" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-oliveDeep"
                                                />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">Dirección de Envío</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={customerData.direccion}
                                                    onChange={(e) => setCustomerData({...customerData, direccion: e.target.value})}
                                                    placeholder="Av. Colón 1234, Córdoba" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-oliveDeep"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">Teléfono de Contacto</label>
                                                <input 
                                                    type="tel" 
                                                    required
                                                    value={customerData.telefono}
                                                    onChange={(e) => setCustomerData({...customerData, telefono: e.target.value})}
                                                    placeholder="+54 9 351 123456" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-oliveDeep"
                                                />
                                            </div>
                                        </div>

                                        <h4 className="text-xs font-black text-oliveDeep uppercase tracking-wider pt-4 border-t border-stone-100 mb-2">Pago Electrónico Simulado</h4>
                                        
                                        <div>
                                            <label className="block text-xs font-black text-slate-900 mb-1">Método de Pago</label>
                                            <div className="flex gap-4">
                                                {['Tarjeta de Crédito', 'Tarjeta de Débito'].map(m => (
                                                    <label key={m} className="flex items-center gap-2 text-sm text-slate-900 font-bold cursor-pointer">
                                                        <input 
                                                            type="radio" 
                                                            name="metodoPago"
                                                            checked={customerData.metodoPago === m}
                                                            onChange={() => setCustomerData({...customerData, metodoPago: m})}
                                                            className="text-oliveDeep focus:ring-oliveDeep h-4 w-4"
                                                        />
                                                        {m}
                                                    </label>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-black text-slate-900 mb-1">Número de Tarjeta</label>
                                            <input 
                                                type="text" 
                                                required
                                                maxLength="19"
                                                value={customerData.tarjetaNumero}
                                                onChange={(e) => setCustomerData({...customerData, tarjetaNumero: e.target.value.replace(/\s?/g, '').replace(/(\d{4})/g, '$1 ').trim()})}
                                                placeholder="4517 8492 0192 4810" 
                                                className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-oliveDeep font-mono font-bold text-center"
                                            />
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">Vencimiento</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    maxLength="5"
                                                    value={customerData.tarjetaVence}
                                                    onChange={(e) => setCustomerData({...customerData, tarjetaVence: e.target.value})}
                                                    placeholder="MM/AA" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-oliveDeep font-mono font-bold text-center"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-black text-slate-900 mb-1">CVC</label>
                                                <input 
                                                    type="password" 
                                                    required
                                                    maxLength="3"
                                                    value={customerData.tarjetaCvc}
                                                    onChange={(e) => setCustomerData({...customerData, tarjetaCvc: e.target.value})}
                                                    placeholder="123" 
                                                    className="w-full bg-stone-50 border-2 border-stone-200 rounded-lg p-2.5 text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-oliveDeep font-mono font-bold text-center"
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 text-xs text-slate-800 space-y-1.5 font-semibold">
                                            <div className="flex justify-between text-slate-950 text-sm font-bold">
                                                <span>Total a debitar:</span>
                                                <span className="text-base font-black text-oliveDeep">${totalCompra.toLocaleString('es-AR')}</span>
                                            </div>
                                            <p className="italic font-medium">Este es un entorno seguro de testeo y simulación para NutriCrisp.</p>
                                        </div>

                                        <button 
                                            type="submit"
                                            className="w-full bg-terracotta hover:bg-terracottaHover text-white py-4 rounded-xl font-black tracking-wide transition-all uppercase text-sm mt-4 shadow-md flex items-center justify-center gap-2 active:scale-95"
                                        >
                                            <i className="fa-solid fa-lock text-sm"></i> Confirmar Pago e Iniciar Compra
                                        </button>
                                    </form>
                                )}

                                {/* PASO 2: PROCESANDO PAGO */}
                                {checkoutStep === 'processing' && (
                                    <div className="p-16 text-center space-y-6">
                                        <div className="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-terracotta"></div>
                                        <h3 className="text-xl font-black text-oliveDeep">Procesando Pago Seguro...</h3>
                                        <p className="text-sm text-slate-800 font-semibold max-w-xs mx-auto leading-relaxed">Estamos validando los datos con la pasarela bancaria. Esto demorará unos instantes.</p>
                                    </div>
                                )}

                                {/* PASO 3: FACTURA DIGITAL / ÉXITO */}
                                {checkoutStep === 'success' && (
                                    <div className="max-h-[85vh] overflow-y-auto">
                                        
                                        <div className="bg-emerald-900 text-white p-8 text-center space-y-2">
                                            <div className="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center text-3xl mx-auto mb-2 text-white animate-bounce">
                                                <i className="fa-solid fa-circle-check text-4xl"></i>
                                            </div>
                                            <h2 className="text-2xl font-black tracking-tight">¡Compra Exitosa!</h2>
                                            <p className="text-base text-stone-100 font-semibold max-w-sm mx-auto leading-relaxed">Tu transacción fue confirmada de manera electrónica.</p>
                                        </div>

                                        <div className="p-6 space-y-6">
                                            
                                            <div className="p-4 bg-emerald-50 text-emerald-950 rounded-xl border-2 border-emerald-200 text-sm flex items-start gap-3 font-semibold leading-relaxed">
                                                <i className="fa-solid fa-envelope-open text-lg text-emerald-700 mt-0.5"></i>
                                                <div>
                                                    <strong className="font-black">Notificación de envío:</strong> Se ha despachado automáticamente un correo detallando la factura oficial e información logística a tu Gmail: <strong className="font-black underline">{customerData.email}</strong>.
                                                </div>
                                            </div>

                                            {/* Diseño de Factura Oficial de Alto Contraste */}
                                            <div className="border-2 border-stone-300 rounded-2xl p-6 bg-white space-y-6 text-sm text-slate-900 font-mono relative overflow-hidden shadow-sm">
                                                
                                                <div className="flex justify-between items-start pb-4 border-b-2 border-stone-200">
                                                    <div>
                                                        <h3 className="text-lg font-black text-oliveDeep font-sans leading-none mb-1">NutriCrisp S.A.</h3>
                                                        <p className="font-bold">CUIT: 30-74839201-9</p>
                                                        <p className="font-bold">Dirección: Av. Colón 1200, Córdoba, AR</p>
                                                        <p className="font-bold">Soporte: ventas@nutricrisp.com</p>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="bg-slate-900 text-white px-2.5 py-1 rounded text-xs font-black">FACTURA B</span>
                                                        <p className="mt-3 font-black text-oliveDeep text-base leading-none">{invoiceNumber}</p>
                                                        <p className="font-bold">Fecha: {orderDate}</p>
                                                    </div>
                                                </div>

                                                <div className="space-y-1.5 border-b-2 border-stone-200 pb-4">
                                                    <p className="font-black text-slate-950 font-sans uppercase text-xs tracking-wider">Cliente / Destinatario</p>
                                                    <p className="font-bold"><strong className="font-black text-slate-950">Nombre:</strong> {customerData.nombre}</p>
                                                    <p className="font-bold"><strong className="font-black text-slate-950">Email:</strong> {customerData.email}</p>
                                                    <p className="font-bold"><strong className="font-black text-slate-950">Dirección:</strong> {customerData.direccion}</p>
                                                    <p className="font-bold"><strong className="font-black text-slate-950">Teléfono:</strong> {customerData.telefono}</p>
                                                    <p className="font-bold"><strong className="font-black text-slate-950">Medio Pago:</strong> {customerData.metodoPago} (Terminada en {customerData.tarjetaNumero.slice(-4)})</p>
                                                </div>

                                                <div className="space-y-3 py-2">
                                                    <div className="grid grid-cols-12 font-black text-slate-950 border-b-2 border-stone-200 pb-2">
                                                        <span className="col-span-6">Producto</span>
                                                        <span className="col-span-2 text-center">Cant.</span>
                                                        <span className="col-span-2 text-right">P. Unit</span>
                                                        <span className="col-span-2 text-right">Subtotal</span>
                                                    </div>
                                                    
                                                    {cart.map((item, index) => (
                                                        <div key={index} className="grid grid-cols-12 text-slate-950 font-bold border-b border-stone-100 pb-2">
                                                            <div className="col-span-6 flex flex-col">
                                                                <span className="font-black text-slate-950 font-sans text-base">{item.nombre}</span>
                                                                {item.sabor && <span className="text-xs text-terracotta font-black">Sabor: {item.sabor}</span>}
                                                            </div>
                                                            <span className="col-span-2 text-center">{item.cantidad}</span>
                                                            <span className="col-span-2 text-right">${item.precio.toLocaleString('es-AR')}</span>
                                                            <span className="col-span-2 text-right">${(item.precio * item.cantidad).toLocaleString('es-AR')}</span>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="flex justify-end pt-2">
                                                    <div className="w-72 space-y-2 text-right font-bold text-slate-950">
                                                        <div className="flex justify-between">
                                                            <span>Subtotal Neto:</span>
                                                            <span>${subtotal.toLocaleString('es-AR')}</span>
                                                        </div>
                                                        <div className="flex justify-between">
                                                            <span>Costo de Despacho:</span>
                                                            <span>
                                                                {costoEnvio === 0 ? '$0 (Bonificado)' : `$${costoEnvio.toLocaleString('es-AR')}`}
                                                            </span>
                                                        </div>
                                                        <div className="flex justify-between text-base font-black text-oliveDeep pt-2 border-t-2 border-stone-200">
                                                            <span>TOTAL DEBITADO:</span>
                                                            <span>${totalCompra.toLocaleString('es-AR')}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Código QR ficticio de AFIP de alta legibilidad */}
                                                <div className="flex items-center gap-4 pt-4 border-t-2 border-stone-200 text-xs text-slate-800 font-bold leading-normal">
                                                    <div className="w-14 h-14 bg-black p-0.5 flex items-center justify-center flex-shrink-0">
                                                        <div className="w-full h-full bg-white flex items-center justify-center font-sans font-black text-slate-950 text-xs border border-slate-900 text-center">
                                                            QR AFIP
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <p>Comprobante de transacción electrónica aprobada por AFIP.</p>
                                                        <p>NutriCrisp S.A. Córdoba Capital. República Argentina.</p>
                                                    </div>
                                                </div>

                                            </div>

                                            <div className="flex gap-4">
                                                <button 
                                                    onClick={() => window.print()}
                                                    className="flex-1 bg-stone-100 hover:bg-stone-200 text-slate-950 py-3.5 rounded-xl font-black text-sm tracking-wide transition-colors flex items-center justify-center gap-2 border-2 border-stone-300"
                                                >
                                                    <i className="fa-solid fa-print text-base"></i> Imprimir Factura
                                                </button>
                                                <button 
                                                    onClick={handleFinishProcess}
                                                    className="flex-1 bg-oliveDeep hover:bg-oliveMedium text-white py-3.5 rounded-xl font-black tracking-wide transition-all uppercase text-sm shadow-md"
                                                >
                                                    Finalizar
                                                </button>
                                            </div>

                                        </div>

                                    </div>
                                )}

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
